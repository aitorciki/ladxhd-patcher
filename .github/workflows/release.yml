name: Release
run-name: >-
  ${{
    github.event_name == 'schedule' && 'Nightly Build' ||
    inputs.trigger == 'nightly' && 'Nightly Build' ||
    inputs.trigger == 'release' && (inputs.upstream_tag && format('Release {0}', inputs.upstream_tag) || 'Release Build') ||
    'Manual Build'
  }}

on:
  workflow_dispatch:
    inputs:
      trigger:
        description: "Trigger type: release, nightly, or manual"
        required: false
        default: "manual"
      upstream_tag:
        description: "Upstream tag (for release trigger only)"
        required: false
        default: ""
  schedule:
    - cron: "0 5 * * *"

jobs:
  game:
    uses: ./.github/workflows/build-game.yml
    secrets: inherit
    with:
      game_ref: ${{ inputs.upstream_tag }}

  launcher:
    uses: ./.github/workflows/build-launcher.yml
    secrets: inherit
    with:
      game_ref: ${{ inputs.upstream_tag }}

  finalize-windows:
    needs: [game, launcher]
    runs-on: windows-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT }}
      AWS_DEFAULT_REGION: auto
      R2_BUCKET: ${{ secrets.R2_BUCKET_NAME }}
      ASSET_ENCRYPTION_KEY: ${{ secrets.ASSET_ENCRYPTION_KEY }}
      RUN_ID: ${{ github.run_id }}
    steps:
      - name: Checkout ladxhd-patcher
        uses: actions/checkout@v6

      - name: Download artifacts from R2
        shell: bash
        run: |
          scripts/r2-download.sh \
            windows-dx.tar.gz windows-gl.tar.gz launcher-windows.tar.gz

      - name: Unpack launcher
        shell: bash
        run: |
          mkdir -p launcher
          tar -xzf launcher-windows.tar.gz -C launcher

      - name: Finalize WindowsDX
        shell: bash
        run: |
          export PATH="$PATH:/c/Program Files/7-Zip"
          mkdir -p game-dx
          tar -xzf windows-dx.tar.gz -C game-dx
          cp -r launcher/* game-dx/
          rm -f game-dx/nfd.lib game-dx/nfd.pdb
          mkdir -p "final/windows-dx/Links Awakening DX HD"
          mv game-dx/* "final/windows-dx/Links Awakening DX HD/"
          cd final/windows-dx
          7z a -r ../../final-windows-dx.zip "Links Awakening DX HD"
          cd ../..

      - name: Finalize WindowsGL
        shell: bash
        run: |
          export PATH="$PATH:/c/Program Files/7-Zip"
          mkdir -p game-gl
          tar -xzf windows-gl.tar.gz -C game-gl
          cp -r launcher/* game-gl/
          rm -f game-gl/nfd.lib game-gl/nfd.pdb
          mkdir -p "final/windows-gl/Links Awakening DX HD"
          mv game-gl/* "final/windows-gl/Links Awakening DX HD/"
          cd final/windows-gl
          7z a -r ../../final-windows-gl.zip "Links Awakening DX HD"
          cd ../..

      - name: Upload final packages to R2
        shell: bash
        run: scripts/r2-upload.sh final-windows-dx.zip final-windows-gl.zip

  finalize-linux:
    needs: [game, launcher]
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT }}
      AWS_DEFAULT_REGION: auto
      R2_BUCKET: ${{ secrets.R2_BUCKET_NAME }}
      ASSET_ENCRYPTION_KEY: ${{ secrets.ASSET_ENCRYPTION_KEY }}
      RUN_ID: ${{ github.run_id }}
    steps:
      - name: Checkout ladxhd-patcher
        uses: actions/checkout@v6

      - name: Download artifacts from R2
        shell: bash
        run: |
          scripts/r2-download.sh \
            linux-x64.tar.gz linux-arm64.tar.gz \
            launcher-linux-x64.tar.gz launcher-linux-arm64.tar.gz

      - name: Finalize Linux-x64
        shell: bash
        run: |
          mkdir -p game launcher final/linux-x64/"Links Awakening DX HD"
          tar -xzf linux-x64.tar.gz -C game
          tar -xzf launcher-linux-x64.tar.gz -C launcher
          cp -r launcher/* game/
          chmod +x game/"Link's Awakening DX HD"
          chmod +x game/Launcher
          mv game/* final/linux-x64/"Links Awakening DX HD/"
          cd final/linux-x64
          zip -r ../../final-linux-x64.zip "Links Awakening DX HD"

      - name: Finalize Linux-arm64
        shell: bash
        run: |
          mkdir -p game launcher final/linux-arm64/"Links Awakening DX HD"
          tar -xzf linux-arm64.tar.gz -C game
          tar -xzf launcher-linux-arm64.tar.gz -C launcher
          cp -r launcher/* game/
          chmod +x game/"Link's Awakening DX HD"
          chmod +x game/Launcher
          mv game/* final/linux-arm64/"Links Awakening DX HD/"
          cd final/linux-arm64
          zip -r ../../final-linux-arm64.zip "Links Awakening DX HD"

      - name: Upload final packages to R2
        shell: bash
        run: scripts/r2-upload.sh final-linux-x64.zip final-linux-arm64.zip

  finalize-macos:
    needs: [game, launcher]
    runs-on: macos-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT }}
      AWS_DEFAULT_REGION: auto
      R2_BUCKET: ${{ secrets.R2_BUCKET_NAME }}
      ASSET_ENCRYPTION_KEY: ${{ secrets.ASSET_ENCRYPTION_KEY }}
      RUN_ID: ${{ github.run_id }}
    steps:
      - name: Checkout ladxhd-patcher
        uses: actions/checkout@v6

      - name: Checkout BigheadSMZ/Zelda-LA-DX-HD-Updated
        uses: actions/checkout@v6
        with:
          repository: BigheadSMZ/Zelda-LA-DX-HD-Updated
          path: game
          sparse-checkout: |
            icon/macos
            Directory.Build.props

      - name: Read game version
        shell: bash
        run: |
          VERSION=$(sed -n 's/.*<GameVersion>\(.*\)<\/GameVersion>.*/\1/p' game/Directory.Build.props)
          echo "GAME_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Download artifacts from R2
        shell: bash
        run: |
          scripts/r2-download.sh \
            macos-arm64.tar.gz macos-x64.tar.gz \
            launcher-macos-arm64.tar.gz launcher-macos-x64.tar.gz

      - name: Finalize macOS-arm64
        shell: bash
        run: |
          mkdir -p work
          tar -xzf macos-arm64.tar.gz -C work
          tar -xzf launcher-macos-arm64.tar.gz -C work

          export GAME_VERSION="$GAME_VERSION"
          export GAME_ARCH="arm64"
          export ICON_SRC="game/icon/macos/Icon.icns"
          scripts/bundle_macos.sh work

          mkdir -p final/macos-arm64-game/"Links Awakening DX HD"
          cp -RPp "work/Link's Awakening DX HD.app" "final/macos-arm64-game/Links Awakening DX HD/"
          cd final/macos-arm64-game
          zip -ry ../../final-macos-arm64-game.zip "Links Awakening DX HD"
          cd ../..

          mkdir -p final/macos-arm64-launcher/"Links Awakening DX HD"
          cp -RPp "work/Link's Awakening DX HD Launcher.app" "final/macos-arm64-launcher/Links Awakening DX HD/"
          cd final/macos-arm64-launcher
          zip -ry ../../final-macos-arm64-launcher.zip "Links Awakening DX HD"
          cd ../..

      - name: Finalize macOS-x64
        shell: bash
        run: |
          rm -rf work
          mkdir -p work
          tar -xzf macos-x64.tar.gz -C work
          tar -xzf launcher-macos-x64.tar.gz -C work

          export GAME_VERSION="$GAME_VERSION"
          export GAME_ARCH="x86_64"
          export ICON_SRC="game/icon/macos/Icon.icns"
          scripts/bundle_macos.sh work

          mkdir -p final/macos-x64-game/"Links Awakening DX HD"
          cp -RPp "work/Link's Awakening DX HD.app" "final/macos-x64-game/Links Awakening DX HD/"
          cd final/macos-x64-game
          zip -ry ../../final-macos-x64-game.zip "Links Awakening DX HD"
          cd ../..

          mkdir -p final/macos-x64-launcher/"Links Awakening DX HD"
          cp -RPp "work/Link's Awakening DX HD Launcher.app" "final/macos-x64-launcher/Links Awakening DX HD/"
          cd final/macos-x64-launcher
          zip -ry ../../final-macos-x64-launcher.zip "Links Awakening DX HD"
          cd ../..

      - name: Upload final packages to R2
        shell: bash
        run: |
          scripts/r2-upload.sh \
            final-macos-arm64-game.zip final-macos-arm64-launcher.zip \
            final-macos-x64-game.zip final-macos-x64-launcher.zip

  finalize-android:
    needs: [game]
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT }}
      AWS_DEFAULT_REGION: auto
      R2_BUCKET: ${{ secrets.R2_BUCKET_NAME }}
      ASSET_ENCRYPTION_KEY: ${{ secrets.ASSET_ENCRYPTION_KEY }}
      RUN_ID: ${{ github.run_id }}
    steps:
      - name: Checkout ladxhd-patcher
        uses: actions/checkout@v6

      - name: Download artifacts from R2
        shell: bash
        run: scripts/r2-download.sh android.tar.gz

      - name: Finalize Android
        shell: bash
        run: |
          mkdir -p final/android/"Links Awakening DX HD"
          tar -xzf android.tar.gz -C final/android/"Links Awakening DX HD"
          cd final/android/"Links Awakening DX HD"
          rm -f _Microsoft.Android.Resource.Designer.dll
          rm -f com.zelda.ladxhd.apk
          mv com.zelda.ladxhd-Signed.apk com.zelda.ladxhd.apk
          cd ..
          zip -r ../../final-android.zip "Links Awakening DX HD"

      - name: Upload final package to R2
        shell: bash
        run: scripts/r2-upload.sh final-android.zip

  generate-patches:
    needs: [finalize-windows, finalize-linux, finalize-macos, finalize-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT }}
      AWS_DEFAULT_REGION: auto
      R2_BUCKET: ${{ secrets.R2_BUCKET_NAME }}
      ASSET_ENCRYPTION_KEY: ${{ secrets.ASSET_ENCRYPTION_KEY }}
      RUN_ID: ${{ github.run_id }}
    steps:
      - name: Checkout ladxhd-patcher
        uses: actions/checkout@v6

      - name: Install xdelta3
        shell: bash
        run: sudo apt-get update && sudo apt-get install -y xdelta3

      - name: Download v1.0.0 archive
        shell: bash
        run: curl -fL "${{ secrets.V1_URL }}" -o v1.zip

      - name: Download finalized packages from R2
        shell: bash
        run: |
          scripts/r2-download.sh \
            final-windows-dx.zip final-windows-gl.zip \
            final-linux-x64.zip final-linux-arm64.zip \
            final-macos-arm64-game.zip final-macos-arm64-launcher.zip \
            final-macos-x64-game.zip final-macos-x64-launcher.zip \
            final-android.zip

      - name: Compute release metadata
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ inputs.trigger }}" = "nightly" ]; then
            echo "RELEASE_TAG=nightly" >> "$GITHUB_ENV"
            echo "RELEASE_SUFFIX=nightly-$(date -u +%Y%m%d)" >> "$GITHUB_ENV"
            echo "RELEASE_TITLE=Nightly ($(date -u +%Y%m%d))" >> "$GITHUB_ENV"
            echo "RELEASE_NOTES=Automated build from run ${{ github.run_id }}" >> "$GITHUB_ENV"
            echo "IS_NIGHTLY=true" >> "$GITHUB_ENV"
          elif [ "${{ inputs.trigger }}" = "release" ]; then
            echo "RELEASE_TAG=${{ inputs.upstream_tag }}" >> "$GITHUB_ENV"
            echo "RELEASE_SUFFIX=${{ inputs.upstream_tag }}" >> "$GITHUB_ENV"
            echo "RELEASE_TITLE=${{ inputs.upstream_tag }}" >> "$GITHUB_ENV"
            echo "RELEASE_NOTES=Built from upstream release: https://github.com/BigheadSMZ/Zelda-LA-DX-HD-Updated/releases/tag/${{ inputs.upstream_tag }}" >> "$GITHUB_ENV"
            echo "IS_NIGHTLY=false" >> "$GITHUB_ENV"
          else
            echo "RELEASE_SUFFIX=build-${{ github.run_id }}" >> "$GITHUB_ENV"
          fi

      - name: Generate xdelta3 patches
        shell: bash
        run: |
          scripts/generate_xdelta_patches.sh v1.zip "$RELEASE_SUFFIX" \
            windows-dx windows-gl linux-x64 linux-arm64 \
            macos-arm64-game macos-arm64-launcher \
            macos-x64-game macos-x64-launcher android

      - name: Create GitHub release
        if: github.event_name == 'schedule' || inputs.trigger == 'nightly' || inputs.trigger == 'release'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "$IS_NIGHTLY" = "true" ]; then
            gh release delete "$RELEASE_TAG" --yes 2>/dev/null || true
          fi
          ASSETS=""
          for key in windows-dx windows-gl linux-x64 linux-arm64 \
                     macos-arm64-game macos-arm64-launcher \
                     macos-x64-game macos-x64-launcher android; do
            ASSETS="$ASSETS ${key}-${RELEASE_SUFFIX}.xdelta"
          done
          gh release create "$RELEASE_TAG" \
            --title "$RELEASE_TITLE" \
            --notes "$RELEASE_NOTES" \
            $ASSETS

      - name: Upload xdelta - windows-dx
        if: github.event_name == 'workflow_dispatch' && inputs.trigger == 'manual'
        uses: actions/upload-artifact@v7
        with:
          name: windows-dx-build-${{ github.run_id }}
          path: windows-dx-*.xdelta

      - name: Upload xdelta - windows-gl
        if: github.event_name == 'workflow_dispatch' && inputs.trigger == 'manual'
        uses: actions/upload-artifact@v7
        with:
          name: windows-gl-build-${{ github.run_id }}
          path: windows-gl-*.xdelta

      - name: Upload xdelta - linux-x64
        if: github.event_name == 'workflow_dispatch' && inputs.trigger == 'manual'
        uses: actions/upload-artifact@v7
        with:
          name: linux-x64-build-${{ github.run_id }}
          path: linux-x64-*.xdelta

      - name: Upload xdelta - linux-arm64
        if: github.event_name == 'workflow_dispatch' && inputs.trigger == 'manual'
        uses: actions/upload-artifact@v7
        with:
          name: linux-arm64-build-${{ github.run_id }}
          path: linux-arm64-*.xdelta

      - name: Upload xdelta - macos-arm64-game
        if: github.event_name == 'workflow_dispatch' && inputs.trigger == 'manual'
        uses: actions/upload-artifact@v7
        with:
          name: macos-arm64-game-build-${{ github.run_id }}
          path: macos-arm64-game-*.xdelta

      - name: Upload xdelta - macos-arm64-launcher
        if: github.event_name == 'workflow_dispatch' && inputs.trigger == 'manual'
        uses: actions/upload-artifact@v7
        with:
          name: macos-arm64-launcher-build-${{ github.run_id }}
          path: macos-arm64-launcher-*.xdelta

      - name: Upload xdelta - macos-x64-game
        if: github.event_name == 'workflow_dispatch' && inputs.trigger == 'manual'
        uses: actions/upload-artifact@v7
        with:
          name: macos-x64-game-build-${{ github.run_id }}
          path: macos-x64-game-*.xdelta

      - name: Upload xdelta - macos-x64-launcher
        if: github.event_name == 'workflow_dispatch' && inputs.trigger == 'manual'
        uses: actions/upload-artifact@v7
        with:
          name: macos-x64-launcher-build-${{ github.run_id }}
          path: macos-x64-launcher-*.xdelta

      - name: Upload xdelta - android
        if: github.event_name == 'workflow_dispatch' && inputs.trigger == 'manual'
        uses: actions/upload-artifact@v7
        with:
          name: android-build-${{ github.run_id }}
          path: android-*.xdelta

      - name: Clean up R2 artifacts
        shell: bash
        run: aws s3 rm "s3://${R2_BUCKET}/${RUN_ID}/" --recursive

  cleanup-caches:
    needs:
      - game
      - launcher
      - finalize-windows
      - finalize-linux
      - finalize-macos
      - finalize-android
      - generate-patches
    if: always()
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Delete old caches (keep last 3)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh cache list \
            --repo ${{ github.repository }} \
            --limit 1000 \
            --json key,lastAccessedAt \
            --jq '. | sort_by(.lastAccessedAt) | reverse | .[3:] | .[].key' | \
          while IFS= read -r key; do
            [ -n "$key" ] && gh cache delete "$key" --repo ${{ github.repository }} || true
          done
